name: Build ocserv SPK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      spk_rev:
        description: 'SPK revision number'
        required: true
        default: '1'

jobs:
  build:
    name: Build SPK (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            display: x86_64
            tcversion: "7.2"
          - arch: aarch64
            display: aarch64
            tcversion: "7.2"
          - arch: armv8
            display: armv8
            tcversion: "7.2"

    steps:
      - uses: actions/checkout@v4

      - name: Cache spksrc build artifacts
        uses: actions/cache@v4
        with:
          path: |
            /tmp/spksrc/distrib
            /tmp/spksrc/toolchain
          key: spksrc-${{ matrix.arch }}-${{ matrix.tcversion }}-${{ hashFiles('cross/**') }}-v1

      - name: Clone spksrc
        run: git clone --depth 1 https://github.com/SynoCommunity/spksrc.git /tmp/spksrc

      - name: Inject cross and spk packages
        run: |
          cp -r cross/radcli /tmp/spksrc/cross/radcli
          cp -r cross/ocserv /tmp/spksrc/cross/ocserv
          cp -r spk/ocserv   /tmp/spksrc/spk/ocserv

      - name: Build SPK
        run: |
          docker run --rm \
            -v "/tmp/spksrc:/spksrc" \
            -w /spksrc \
            ghcr.io/synocommunity/spksrc:latest \
            make -C spk/ocserv ARCH=${{ matrix.arch }} TCVERSION=${{ matrix.tcversion }}

      - name: Find built SPK
        id: spk
        run: |
          SPK=$(ls /tmp/spksrc/packages/*.spk | head -1)
          echo "path=${SPK}" >> "$GITHUB_OUTPUT"
          echo "name=$(basename ${SPK})" >> "$GITHUB_OUTPUT"

      - name: Upload SPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: spk-${{ matrix.display }}
          path: ${{ steps.spk.outputs.path }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: spk-*
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ocserv 1.5.0"
          body: |
            ## ocserv 1.5.0 — Synology SPK

            OpenConnect VPN server — compatible with Cisco AnyConnect SSL VPN clients.
            Source: https://www.infradead.org/ocserv/download/ocserv-1.5.0.tar.xz

            ### Authentication
            - **Local** — password file managed with `ocpasswd`
            - **RADIUS** — per-user auth via RFC 2865 RADIUS server (accounting disabled)

            ### Installation
            1. Download the `.spk` matching your NAS architecture.
            2. In **Package Center → Manual Install**, upload the file.
            3. Follow the setup wizard.

            ### Add local VPN users
            ```sh
            /var/packages/ocserv/target/bin/ocpasswd \
                -c /var/packages/ocserv/var/lib/ocpasswd <username>
            ```

            ### Architectures
            | File | NAS models (examples) |
            |------|-----------------------|
            | `*_x64-7.2_*.spk`     | DS918+, DS920+, DS923+   |
            | `*_aarch64-7.2_*.spk` | DS223, DS423+            |
            | `*_armv8-7.2_*.spk`   | DS120j, DS220j           |
          files: dist/*.spk
