{
  "type": "page",
  "title": "OpenConnect VPN Server Setup",
  "items": [
    {
      "type": "textfield",
      "desc": "VPN listening port (TCP + UDP). Default: 443",
      "subitems": [
        {
          "key": "wizard_vpn_port",
          "desc": "VPN Port",
          "defaultValue": "443",
          "validator": {
            "allowBlank": false,
            "regex": {
              "expr": "^[0-9]{1,5}$",
              "errorText": "Please enter a valid port number (1–65535)."
            }
          }
        }
      ]
    },
    {
      "type": "textfield",
      "desc": "Absolute path to the server TLS certificate (PEM). Leave blank to configure later.",
      "subitems": [
        {
          "key": "wizard_server_cert",
          "desc": "Server Certificate Path",
          "defaultValue": ""
        }
      ]
    },
    {
      "type": "textfield",
      "desc": "Absolute path to the server TLS private key (PEM). Leave blank to configure later.",
      "subitems": [
        {
          "key": "wizard_server_key",
          "desc": "Server Private Key Path",
          "defaultValue": ""
        }
      ]
    },
    {
      "type": "textfield",
      "desc": "Absolute path to the CA certificate bundle (PEM). Leave blank to configure later.",
      "subitems": [
        {
          "key": "wizard_ca_cert",
          "desc": "CA Certificate Path",
          "defaultValue": ""
        }
      ]
    }
  ]
}
